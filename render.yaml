services:
  # Unified ARGUS Backend (Phase 1 + 2 + Telegram)
  - type: web
    name: argus-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && cd contagion-shield && npm install && cd ..
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: AVE_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DB_PATH
        value: ./data/argus.db
      - key: TURSO_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: WHALE_ENTRY_THRESHOLD_USD
        value: "50000"
      - key: REPORT_INTERVAL_MINUTES
        value: "30"
      - key: LOG_LEVEL
        value: info
